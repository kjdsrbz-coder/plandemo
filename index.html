<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>生鲜供应链计划 Agent</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --bg: #f5f7fa;
      --surface: #ffffff;
      --surface-muted: #f8fafc;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --success: #16a34a;
      --warning: #f59e0b;
      --danger: #dc2626;
      --radius: 12px;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      --nav-height: 60px;
      --side-width: 220px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 1440px;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button, input, select { font: inherit; }

    .app-shell {
      display: grid;
      grid-template-columns: var(--side-width) 1fr;
      grid-template-rows: var(--nav-height) 1fr;
      height: 100vh;
    }

    .topbar {
      grid-column: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .env-tag {
      padding: 5px 10px;
      border-radius: 999px;
      color: var(--primary);
      background: #eff6ff;
      border: 1px solid rgba(37, 99, 235, 0.16);
      font-weight: 600;
    }

    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 18px 12px;
    }

    .menu-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 10px;
      color: #334155;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease;
    }

    .menu-item:hover { background: #f8fafc; }
    .menu-item.active {
      background: #eff6ff;
      color: var(--primary);
      font-weight: 600;
    }

    .menu-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7;
    }

    .content {
      overflow: auto;
      padding: 18px;
    }

    .page {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 15px;
      font-weight: 700;
    }

    .panel-subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .filters {
      padding: 16px 18px 18px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr)) 160px;
      gap: 12px;
      align-items: end;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    .field-control, .field select {
      width: 100%;
      height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .field-control:focus, .field select:focus {
      border-color: rgba(37, 99, 235, 0.45);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
    }

    .primary-btn, .secondary-btn, .mini-btn {
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .primary-btn {
      height: 38px;
      padding: 0 14px;
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    .primary-btn:hover { background: var(--primary-dark); }

    .secondary-btn {
      height: 38px;
      padding: 0 14px;
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .secondary-btn:hover, .mini-btn:hover { background: #f8fafc; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 14px;
    }

    .metric-card {
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .metric-label { color: var(--muted); font-size: 12px; margin-bottom: 10px; }
    .metric-value { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    .metric-trend { display: inline-flex; gap: 6px; font-size: 12px; color: var(--muted); }
    .trend-up { color: var(--success); }
    .trend-down { color: var(--danger); }

    .module-grid {
      padding: 16px 18px 18px;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    .module-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
    }

    .module-card:hover {
      border-color: rgba(37, 99, 235, 0.24);
      box-shadow: 0 8px 20px rgba(37, 99, 235, 0.08);
      transform: translateY(-1px);
    }

    .module-card.active {
      border-color: rgba(37, 99, 235, 0.28);
      background: #eff6ff;
      box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.08);
    }

    .module-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .module-items {
      display: grid;
      gap: 8px;
    }

    .module-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .module-item strong {
      color: #111827;
      font-weight: 600;
    }

    .workspace { display: grid; grid-template-columns: 1fr; gap: 16px; }

    .table-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .tabs {
      display: flex;
      gap: 6px;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
      overflow: auto;
    }

    .tab-btn {
      height: 40px;
      padding: 0 16px;
      border: none;
      background: transparent;
      color: #64748b;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .tab-tools {
      padding: 12px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-muted);
    }

    .tab-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .meta-badge {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
    }

    .table-wrap { overflow: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
    }

    th, td {
      padding: 0 12px;
      border-bottom: 1px solid #edf2f7;
      text-align: left;
      height: 48px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-size: 12px;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    tbody tr { cursor: pointer; transition: background-color 0.12s ease; }
    tbody tr:hover { background: #f8fbff; }
    tbody tr.selected { background: #eff6ff; box-shadow: inset 3px 0 0 var(--primary); }

    .doc-cell {
      display: flex;
      flex-direction: column;
      gap: 3px;
      line-height: 1.2;
    }

    .doc-no { font-weight: 700; color: #1f2937; }
    .doc-sub { font-size: 12px; color: var(--muted); }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 52px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid transparent;
    }

    .status-pending { background: rgba(37, 99, 235, 0.08); color: var(--primary); border-color: rgba(37, 99, 235, 0.16); }
    .status-adjusted { background: rgba(245, 158, 11, 0.1); color: #b45309; border-color: rgba(245, 158, 11, 0.16); }
    .status-confirmed { background: rgba(22, 163, 74, 0.08); color: var(--success); border-color: rgba(22, 163, 74, 0.16); }
    .status-closed { background: #f3f4f6; color: #6b7280; border-color: #e5e7eb; }
    .status-processing { background: rgba(14, 165, 233, 0.08); color: #0369a1; border-color: rgba(14, 165, 233, 0.16); }
    .risk-high { background: rgba(220, 38, 38, 0.08); color: var(--danger); border-color: rgba(220, 38, 38, 0.16); }
    .risk-medium { background: rgba(245, 158, 11, 0.1); color: #b45309; border-color: rgba(245, 158, 11, 0.16); }
    .risk-low { background: rgba(22, 163, 74, 0.08); color: var(--success); border-color: rgba(22, 163, 74, 0.16); }

    .mini-btns { display: flex; gap: 6px; }
    .mini-btn {
      height: 28px;
      padding: 0 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: #334155;
      font-size: 12px;
    }

    .mini-btn[disabled], .primary-btn[disabled], .secondary-btn[disabled] {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .bottom-panels {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .tab-panel { display: none; padding: 16px 18px 18px; }
    .tab-panel.active { display: block; }

    .source-block + .source-block { margin-top: 16px; }
    .inline-table-title { margin: 0 0 10px; font-size: 13px; font-weight: 700; color: #334155; }

    .feedback-loop { padding: 16px 18px 18px; }
    .loop-steps {
      display: grid;
      grid-template-columns: repeat(9, minmax(0, 1fr));
      gap: 10px;
      align-items: center;
    }

    .loop-step {
      min-height: 88px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .loop-step-title { font-size: 13px; font-weight: 700; }
    .loop-step-value { font-size: 18px; font-weight: 700; color: var(--primary); }
    .flow-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 22px;
      font-weight: 700;
    }

    .modal-mask, .drawer-mask {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 40;
    }

    .modal-mask.show { display: flex; align-items: center; justify-content: center; background: rgba(15, 23, 42, 0.34); }
    .drawer-mask.show { display: flex; justify-content: flex-end; background: rgba(15, 23, 42, 0.28); }

    .modal {
      width: 420px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(15, 23, 42, 0.22);
      border: 1px solid #dbe3ee;
      overflow: hidden;
    }

    .modal-header, .modal-footer {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
    }

    .modal-footer {
      border-bottom: none;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 14px; }

    .drawer-panel {
      width: 520px;
      height: 100vh;
      background: #fff;
      border-left: 1px solid var(--border);
      box-shadow: -10px 0 30px rgba(15, 23, 42, 0.12);
      display: flex;
      flex-direction: column;
    }

    .drawer-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }

    .drawer-title { font-size: 15px; font-weight: 700; }
    .drawer-close {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: #475569;
      cursor: pointer;
    }

    .drawer-body {
      flex: 1;
      overflow: auto;
      padding: 16px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .detail-section {
      border: 1px solid #eef2f7;
      border-radius: 10px;
      background: var(--surface-muted);
      padding: 14px;
    }

    .detail-section h4 {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 700;
      color: #1f2937;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px 14px;
    }

    .detail-item .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .detail-item .value {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      word-break: break-word;
    }

    .link-chain {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .link-chip {
      height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      color: #334155;
      cursor: pointer;
    }

    .toast-wrap {
      position: fixed;
      top: 18px;
      right: 24px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      min-width: 320px;
      max-width: 420px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #111827;
      color: #fff;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.2);
      font-size: 13px;
      opacity: 0;
      transform: translateY(-6px);
      animation: toast-in 0.2s ease forwards;
    }

    .global-reset-btn {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 45;
      height: 40px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: #334155;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      font-weight: 600;
    }

    .global-reset-btn:hover {
      background: #f8fafc;
    }

    @keyframes toast-in {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">SC</span>
        <span>生鲜供应链计划 Agent</span>
      </div>
      <div class="topbar-meta">
        <span id="todayDate"></span>
        <span>当前用户：采购计划员 江鑫</span>
        <span class="env-tag">Demo</span>
      </div>
    </header>

    <aside class="sidebar">
      <div class="menu-group" id="sideMenu">
        <div class="menu-item active" data-module="forecast"><span class="menu-dot"></span><span>需求预测</span></div>
        <div class="menu-item" data-module="purchase"><span class="menu-dot"></span><span>采购计划</span></div>
        <div class="menu-item" data-module="replenishment"><span class="menu-dot"></span><span>补货建议</span></div>
        <div class="menu-item" data-module="inventory"><span class="menu-dot"></span><span>库存管理</span></div>
        <div class="menu-item" data-module="supplier"><span class="menu-dot"></span><span>供应商管理</span></div>
        <div class="menu-item" data-module="fulfillment"><span class="menu-dot"></span><span>履约反馈</span></div>
      </div>
    </aside>

    <main class="content">
      <div class="page">
        <section class="panel">
          <div class="panel-head">
            <div>
              <div class="panel-title">计划筛选</div>
              <div class="panel-subtitle">按日期、城市、仓网、品类与计划周期生成 Agent 业务单据</div>
            </div>
          </div>
          <div class="filters">
            <div class="field">
              <label>日期</label>
              <input id="filterDate" class="field-control" type="date" value="2026-06-22" />
            </div>
            <div class="field">
              <label>城市</label>
              <select id="filterCity">
                <option value="all">全部城市</option>
                <option value="福州">福州</option>
                <option value="广州">广州</option>
                <option value="深圳">深圳</option>
                <option value="上海">上海</option>
              </select>
            </div>
            <div class="field">
              <label>仓/门店</label>
              <select id="filterLocation">
                <option value="all">全部仓/门店</option>
                <option value="福州 A 前置仓">福州 A 前置仓</option>
                <option value="福州 B 前置仓">福州 B 前置仓</option>
                <option value="广州 C 前置仓">广州 C 前置仓</option>
                <option value="深圳 D 前置仓">深圳 D 前置仓</option>
                <option value="上海盒马 XX 门店">上海盒马 XX 门店</option>
              </select>
            </div>
            <div class="field">
              <label>品类</label>
              <select id="filterCategory">
                <option value="all">全部品类</option>
                <option value="蔬菜">蔬菜</option>
                <option value="水果">水果</option>
                <option value="肉禽蛋">肉禽蛋</option>
                <option value="乳品">乳品</option>
                <option value="水产">水产</option>
                <option value="熟食">熟食</option>
              </select>
            </div>
            <div class="field">
              <label>计划周期</label>
              <select id="filterCycle">
                <option value="明日">明日</option>
                <option value="未来3天">未来 3 天</option>
                <option value="未来7天">未来 7 天</option>
              </select>
            </div>
            <div class="field">
              <label>单据状态</label>
              <select id="filterStatus">
                <option value="all">全部状态</option>
                <option value="待确认">待确认</option>
                <option value="已调整">已调整</option>
                <option value="已确认">已确认</option>
                <option value="处理中">处理中</option>
                <option value="已关闭">已关闭</option>
              </select>
            </div>
            <button id="generateBtn" class="primary-btn">生成计划建议</button>
          </div>
        </section>

        <section class="metrics" id="metricsRow"></section>

        <section class="workspace">
          <div class="panel">
            <div class="panel-head">
              <div>
                <div class="panel-title" id="workbenchTitle">需求预测 · 业务单据</div>
                <div class="panel-subtitle" id="workbenchSummary">展示当前模块下的业务单据、关联关系和可执行操作</div>
              </div>
              <div class="table-actions">
                <button id="submitExecutionBtn" class="primary-btn">提交执行</button>
                <button id="resetFilterBtn" class="secondary-btn">重置筛选</button>
              </div>
            </div>
            <div class="tabs" id="documentTabs"></div>
            <div class="tab-tools">
              <div class="tab-meta" id="tabMeta"></div>
              <div class="tab-meta">
                <span class="meta-badge" id="currentModuleBadge"></span>
                <span class="meta-badge" id="currentTabBadge"></span>
              </div>
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th style="width: 172px;">单据编号</th>
                    <th style="width: 150px;">来源单据</th>
                    <th style="width: 180px;">业务对象</th>
                    <th style="width: 160px;">数量 / 金额 / 风险</th>
                    <th style="width: 98px;">状态</th>
                    <th style="width: 138px;">创建时间</th>
                    <th style="width: 220px;">操作</th>
                  </tr>
                </thead>
                <tbody id="documentTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="bottom-panels">
          <section class="panel">
            <div class="tabs">
              <button class="tab-btn active" data-bottom-tab="sources">数据来源</button>
              <button class="tab-btn" data-bottom-tab="records">执行记录</button>
              <button class="tab-btn" data-bottom-tab="rules">风险规则</button>
            </div>

        return matchCity && matchLocation && matchCategory && matchStatus;
      });
      return rows;
    }

    function findDocumentById(id) {
      return getAllDocuments().find(item => item.id === id);
    }

    function uniqueIds(ids) {
      return [...new Set((ids || []).filter(id => id && id !== "-"))];
    }

    function markRuntimeFlow(ids) {
      runtimeFlowDocIds = uniqueIds([...(runtimeFlowDocIds || []), ...(ids || [])]);
    }

    function getAncestorIds(doc) {
      const result = [];
      let currentId = doc?.sourceId;
      while (currentId && currentId !== "-") {
        result.push(currentId);
        const currentDoc = findDocumentById(currentId);
        currentId = currentDoc?.sourceId;
      }
      return uniqueIds(result);
    }

    function getDescendantIds(docId) {
      const result = [];
      const queue = [docId];
      while (queue.length) {
        const currentId = queue.shift();
        const children = getAllDocuments().filter(item => item.sourceId === currentId);
        children.forEach(child => {
          if (!result.includes(child.id)) {
            result.push(child.id);
            queue.push(child.id);
          }
        });
      }
      return uniqueIds(result);
    }

    function getDocumentChains(doc) {
      const upstreamIds = getAncestorIds(doc);
      const explicitLinks = uniqueIds(doc.links || []);
      const descendantIds = getDescendantIds(doc.id);
      const downstreamIds = uniqueIds([
        ...descendantIds,
        ...explicitLinks.filter(id => {
          const linked = findDocumentById(id);
          return linked && (linked.sourceId === doc.id || descendantIds.includes(id));
        })
      ]);
      const relatedIds = uniqueIds(explicitLinks.filter(id => !upstreamIds.includes(id) && !downstreamIds.includes(id)));
      return { upstreamIds, downstreamIds, relatedIds };
    }

    function appendLink(docId, linkedId) {
      const doc = findDocumentById(docId);
      if (!doc) return;
      doc.links = uniqueIds([...(doc.links || []), linkedId]);
    }

      const qty = Number(adjustQtyEl.value) || 0;
      const remark = adjustRemarkEl.value.trim() || "人工调整";
      doc.valueSummary = doc.valueSummary.includes("¥") ? `调整金额 ¥${qty.toLocaleString("zh-CN")}` : `${doc.valueSummary.split(" ")[0]} ${qty}`;
      doc.status = "已调整";
      doc.adjustments.unshift([nowTimestamp(), "采购计划员 江鑫", `${remark}：${beforeSummary} → ${doc.valueSummary}`]);
      markRuntimeFlow([doc.id]);
      addRecord("调整单据", doc.id, beforeSummary, doc.valueSummary, "已调整");
      closeAdjustModal();
      createToast("已更新该单据的人工调整结果");
      renderAll();
    }

    function closeDocument(docId) {
      const doc = findDocumentById(docId);
      if (!doc) return;
      const before = doc.status;
      doc.status = "已关闭";
      markRuntimeFlow([doc.id]);
      addRecord("关闭单据", doc.id, before, doc.status, "已关闭");
      createToast("该单据已关闭");
      renderAll();
    }

    function transferDocument(docId) {
      const doc = findDocumentById(docId);
      if (!doc) return;

      if (doc.tabKey === "purchasePlanOrder") {
        const newId = `PR20260622${String(mockData.purchaseRequestOrder.length + 3).padStart(3, "0")}`;
        mockData.purchaseRequestOrder.unshift({
          id: newId,
          sourceId: doc.id,
          module: "purchase",
          tabKey: "purchaseRequestOrder",
          object: doc.object.includes("蔬菜") ? "鸡蛋 30枚" : "采购申请",
          objectSub: doc.city || "采购申请",
          valueSummary: `申请金额 ¥${Math.round((Math.random() * 8000) + 2000).toLocaleString("zh-CN")}`,
          status: "待确认",
          createdAt: nowTimestamp(),
          riskLevel: doc.riskLevel,
          links: [doc.id],
          basicInfo: [["申请部门", "采购计划部"], ["申请人", "江鑫"], ["来源计划单", doc.id], ["审批状态", "待提交"]],
          agentResult: [["推荐供应商", "系统优选"], ["预计采购金额", "按计划拆分"], ["期望到货", "T+1"], ["来源单据", doc.id]],
          riskJudgement: [["价格风险", doc.riskLevel], ["审批风险", "低"], ["质量风险", "中"], ["履约影响", "中"]],
          suggestedAction: [["建议动作", "提交后生成采购订单"]],
          adjustments: [],
          availableActions: ["view", "confirm", "transfer"]
        });
        doc.status = "已关闭";
        if (!doc.links.includes(newId)) doc.links.push(newId);
        markRuntimeFlow([doc.id, newId]);
        addRecord("转采购申请", doc.id, "采购计划单", newId, "完成");
        createToast("已根据采购计划单生成采购申请单");
      } else if (doc.tabKey === "purchaseRequestOrder") {
        const newId = `PO20260622${String(mockData.purchaseOrder.length + 2).padStart(3, "0")}`;
        mockData.purchaseOrder.unshift({
          id: newId,
          sourceId: doc.id,
          module: "purchase",
          tabKey: "purchaseOrder",
          object: "自动生成采购订单",
          objectSub: doc.object,
          valueSummary: doc.valueSummary.replace("申请", "采购"),
          status: "待确认",
          createdAt: nowTimestamp(),
          riskLevel: doc.riskLevel,
          links: [doc.id],
          basicInfo: [["来源申请单", doc.id], ["供应商", "系统优选"], ["订单状态", "待供应商确认"], ["期望到货", "T+1"]],
          agentResult: [["采购金额", doc.valueSummary.replace("申请金额 ", "")], ["订单创建", "系统自动"], ["来源单据", doc.id], ["审批状态", "已通过"]],
          riskJudgement: [["价格风险", doc.riskLevel], ["物流风险", "低"], ["质量风险", "中"], ["履约影响", "中"]],
          suggestedAction: [["建议动作", "等待供应商接单"]],
          adjustments: [],
          availableActions: ["view", "close"]
        });
        doc.status = "已关闭";
        if (!doc.links.includes(newId)) doc.links.push(newId);
        markRuntimeFlow([doc.id, newId]);
        addRecord("转采购订单", doc.id, "采购申请单", newId, "完成");
        createToast("已根据采购申请单生成采购订单");
      } else if (doc.tabKey === "replenishmentSuggestionOrder") {
        const newId = `RT20260622${String(mockData.replenishmentTaskOrder.length + 2).padStart(3, "0")}`;
        mockData.replenishmentTaskOrder.unshift({
          id: newId,
          sourceId: doc.id,
          module: "replenishment",
          tabKey: "replenishmentTaskOrder",
          object: "中心仓 → 前置仓",
          objectSub: doc.object,
          valueSummary: doc.valueSummary.replace("建议补货", "补货量"),
          status: "处理中",
          createdAt: nowTimestamp(),
          riskLevel: doc.riskLevel,
          links: [doc.id],
          basicInfo: [["来源建议单", doc.id], ["执行状态", "待分拨"], ["计划出库", "今日 10:00"], ["计划到货", "今日 12:00"]],
          agentResult: [["补货量", doc.valueSummary.replace("建议补货 ", "")], ["执行路径", "中心仓 → 前置仓"], ["来源单据", doc.id], ["状态", "待执行"]],
          riskJudgement: [["配送风险", "中"], ["仓容风险", "低"], ["履约影响", "正向"], ["临期冲突", "无"]],
          suggestedAction: [["建议动作", "跟踪配送回写"]],
          adjustments: [],
          availableActions: ["view", "close"]
        });
        doc.status = "已关闭";
        if (!doc.links.includes(newId)) doc.links.push(newId);
        markRuntimeFlow([doc.id, newId]);
        addRecord("转补货任务", doc.id, "补货建议单", newId, "完成");
        createToast("已根据补货建议单生成补货任务单");
      } else if (doc.tabKey === "inventoryAlertOrder") {
        if (doc.valueSummary.includes("临期")) {
          const newId = `EX20260622${String(mockData.expiryHandlingOrder.length + 2).padStart(3, "0")}`;
          mockData.expiryHandlingOrder.unshift({
            id: newId,
            sourceId: doc.id,
            module: "inventory",
            tabKey: "expiryHandlingOrder",
            object: doc.object,
            objectSub: doc.objectSub,
            valueSummary: "临期处理待确认",
            status: "待确认",
            createdAt: nowTimestamp(),
            riskLevel: "高",
            links: [doc.id],
            basicInfo: [["来源预警单", doc.id], ["建议处理", "折扣促销"], ["建议折扣", "8 折"], ["剩余保质期", "1 天"]],
            agentResult: [["预计减少损耗", "¥860"], ["处理窗口", "今日"], ["来源单据", doc.id], ["处理方式", "促销"]],
            riskJudgement: [["损耗风险", "高"], ["售后风险", "中"], ["调拨风险", "低"], ["执行风险", "中"]],
            suggestedAction: [["建议动作", "确认后执行临期处理"]],
            adjustments: [],
            availableActions: ["view", "confirm", "close"]
          });
          if (!doc.links.includes(newId)) doc.links.push(newId);
          markRuntimeFlow([doc.id, newId]);
          addRecord("转临期处理", doc.id, "库存预警单", newId, "完成");
          createToast("已根据临期预警生成临期处理单");
        } else {
          const newId = `RP20260622${String(mockData.replenishmentSuggestionOrder.length + 2).padStart(3, "0")}`;
          mockData.replenishmentSuggestionOrder.unshift({
            id: newId,
            sourceId: doc.id,
            module: "replenishment",
            tabKey: "replenishmentSuggestionOrder",
            object: doc.object,
            objectSub: doc.objectSub,
            valueSummary: "建议补货 96",
            status: "待确认",
            createdAt: nowTimestamp(),
            riskLevel: "中",
            links: [doc.id],
            basicInfo: [["来源预警单", doc.id], ["当前库存", "16"], ["安全库存", "20"], ["建议补货量", "96"]],
            agentResult: [["建议补货时间", "今日 11:30"], ["来源单据", doc.id], ["补货策略", "高峰前补足"], ["优先级", "中"]],
            riskJudgement: [["缺货风险", "中"], ["仓容风险", "低"], ["履约风险", "中"], ["临期风险", "低"]],
            suggestedAction: [["建议动作", "确认后转补货任务"]],
            adjustments: [],
            availableActions: ["view", "confirm", "transfer"]
          });
          if (!doc.links.includes(newId)) doc.links.push(newId);
          markRuntimeFlow([doc.id, newId]);
          addRecord("转补货建议", doc.id, "库存预警单", newId, "完成");
          createToast("已根据缺货预警生成补货建议单");
        }
        doc.status = "已关闭";
      }

      renderAll();
    }

    function submitExecution() {
      const executable = getAllDocuments().filter(item => item.status === "已确认" || item.status === "已调整");
      addRecord("提交执行", "批量单据", "-", `${executable.length} 条单据进入执行审批`, "待审批");
      createToast(`已提交 ${executable.length} 条业务单据，等待主管审批`);
      setBottomTab("records");
    }

    function resetFiltersOnly() {
      filterState.date = initialFilterStateSnapshot.date;
      filterState.city = initialFilterStateSnapshot.city;
      filterState.location = initialFilterStateSnapshot.location;
      filterState.category = initialFilterStateSnapshot.category;
      filterState.cycle = initialFilterStateSnapshot.cycle;
      filterState.status = initialFilterStateSnapshot.status;
      filterDateEl.value = filterState.date;
      filterCityEl.value = filterState.city;
      filterLocationEl.value = filterState.location;
      filterCategoryEl.value = filterState.category;
      filterCycleEl.value = filterState.cycle;
      filterStatusEl.value = filterState.status;
    }

    function resetAllDemoData() {
      metrics.splice(0, metrics.length, ...cloneData(initialMetricsSnapshot));
      Object.keys(mockData).forEach(key => delete mockData[key]);
      Object.assign(mockData, cloneData(initialMockDataSnapshot));
      executionRecords = cloneData(initialExecutionRecordsSnapshot);
      runtimeFlowDocIds = [];
      currentModule = initialUiStateSnapshot.currentModule;
      currentTab = initialUiStateSnapshot.currentTab;
      selectedDocumentId = initialUiStateSnapshot.selectedDocumentId;
      editingDocumentId = null;
      resetFiltersOnly();
      closeAdjustModal();
      closeDrawer();
      setBottomTab("sources");
      renderAll();
      createToast("已重置所有演示数据与单据操作");
    }

    function regenerateSuggestions() {
      const accuracy = ["87.1%", "85.8%", "86.9%", "87.4%"][Math.floor(Math.random() * 4)];
      const amount = ["¥132,480", "¥126,920", "¥130,360", "¥134,210"][Math.floor(Math.random() * 4)];
      metrics.find(item => item.key === "accuracy").value = accuracy;
      metrics.find(item => item.key === "purchaseAmount").value = amount;

      const newForecastId = `FP20260622${String(mockData.forecastOrder.length + 1).padStart(3, "0")}`;
      mockData.forecastOrder.unshift({
        id: newForecastId,
        sourceId: "-",
        module: "forecast",
        tabKey: "forecastOrder",
        object: "深圳 D 前置仓",
        objectSub: "明日 / 18 SKU",
        valueSummary: "预测销量 3,240",
        status: "待确认",
        createdAt: nowTimestamp(),
        city: "深圳",
        location: "深圳 D 前置仓",
        category: "综合",
        forecastDate: filterState.date,
        forecastCycle: filterState.cycle,
        skuCount: 18,
        forecastSales: 3240,
        confidence: accuracy,
        generateMode: "Agent 自动生成",
        riskLevel: "中",
        links: [],
        basicInfo: [["预测日期", filterState.date], ["预测周期", filterState.cycle], ["城市", "深圳"], ["SKU 数量", "18"]],
        agentResult: [["预测总销量", "3,240"], ["平均置信度", accuracy], ["缺货截断修正", "已启用"], ["促销天气影响", "已识别"]],
        riskJudgement: [["风险 SKU", "3"], ["价格风险", "1"], ["供应商风险", "1"], ["临期风险", "1"]],
        suggestedAction: [["建议动作", "自动生成采购计划单与补货建议单"]],
        adjustments: [],
        availableActions: ["view", "confirm"]
      });

      const generated = createBundleFromForecast(mockData.forecastOrder[0]);
      markRuntimeFlow([newForecastId, generated.purchasePlanId, generated.replenishmentId, generated.inventoryAlertId, generated.supplierAbnormalId, generated.priceAbnormalId]);

      addRecord("生成建议", "批量单据", "-", "新增预测、采购、补货、预警、异常单据", "完成");
      createToast("Agent 已生成需求预测单、采购计划单、补货建议单及风险预警单");
      renderAll();
    }

    function setModule(moduleKey) {
      currentModule = moduleKey;
      currentTab = modules[moduleKey].tabs[0].key;
      selectedDocumentId = mockData[currentTab][0]?.id || "";
      renderAll();
    }

    function setBottomTab(tabKey) {
      document.querySelectorAll("[data-bottom-tab]").forEach(btn => btn.classList.toggle("active", btn.dataset.bottomTab === tabKey));
      document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.remove("active"));
      document.getElementById(`bottom-${tabKey}`).classList.add("active");
    }

    function renderAll() {
      renderMetrics();
      renderDocumentTabs();
      renderWorkbenchMeta();
      renderDocumentTable();
      renderExecutionRecords();
      renderRules();
      renderSources();
      renderFeedbackLoop();
      document.querySelectorAll(".menu-item").forEach(item => item.classList.toggle("active", item.dataset.module === currentModule));
    }

    function bindEvents() {
      filterDateEl.addEventListener("change", event => { filterState.date = event.target.value; });
      filterCityEl.addEventListener("change", event => { filterState.city = event.target.value; renderDocumentTable(); renderWorkbenchMeta(); });
      filterLocationEl.addEventListener("change", event => { filterState.location = event.target.value; renderDocumentTable(); renderWorkbenchMeta(); });
      filterCategoryEl.addEventListener("change", event => { filterState.category = event.target.value; renderDocumentTable(); renderWorkbenchMeta(); });
      filterCycleEl.addEventListener("change", event => { filterState.cycle = event.target.value; });
      filterStatusEl.addEventListener("change", event => { filterState.status = event.target.value; renderDocumentTable(); renderWorkbenchMeta(); });

      generateBtnEl.addEventListener("click", regenerateSuggestions);
      submitExecutionBtnEl.addEventListener("click", submitExecution);
      resetFilterBtnEl.addEventListener("click", () => {
        resetFiltersOnly();
        renderDocumentTable();
        renderWorkbenchMeta();
      });
      globalResetBtnEl.addEventListener("click", resetAllDemoData);

      sideMenuEl.addEventListener("click", event => {
        const item = event.target.closest("[data-module]");
        if (!item) return;
        setModule(item.dataset.module);
      });

      documentTabsEl.addEventListener("click", event => {
        const btn = event.target.closest("[data-doc-tab]");
        if (!btn) return;
        currentTab = btn.dataset.docTab;
        selectedDocumentId = mockData[currentTab][0]?.id || "";
        renderAll();
      });

      documentTableBodyEl.addEventListener("click", event => {
        const actionBtn = event.target.closest("[data-action]");
        if (actionBtn) {
          const { action, docId } = actionBtn.dataset;
          if (action === "view") openDetailDrawer(docId);
          if (action === "confirm") confirmDocument(docId);
          if (action === "adjust") openAdjustModal(docId);
          if (action === "transfer") transferDocument(docId);
          if (action === "close") closeDocument(docId);
          return;
        }

        const row = event.target.closest("tr[data-doc-id]");
        if (!row) return;
        selectedDocumentId = row.dataset.docId;
        renderDocumentTable();
        openDetailDrawer(row.dataset.docId);
      });

      document.querySelectorAll("[data-bottom-tab]").forEach(btn => {
        btn.addEventListener("click", () => setBottomTab(btn.dataset.bottomTab));
      });

      adjustCancelEl.addEventListener("click", closeAdjustModal);
      adjustSaveEl.addEventListener("click", adjustDocument);
      adjustModalMaskEl.addEventListener("click", event => { if (event.target === adjustModalMaskEl) closeAdjustModal(); });

      drawerCloseEl.addEventListener("click", closeDrawer);
      detailDrawerMaskEl.addEventListener("click", event => { if (event.target === detailDrawerMaskEl) closeDrawer(); });
      drawerBodyEl.addEventListener("click", event => {
        const chip = event.target.closest("[data-link-doc]");
        if (!chip) return;
        openDetailDrawer(chip.dataset.linkDoc);
      });
    }

    function init() {
      todayDateEl.textContent = `今日日期：${formatDate("2026-06-21")}`;
      renderAll();
      bindEvents();
    }

    init();
  </script>
</body>
</html>
